<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>3D Model Viewer</title>
    <style>
        body { margin: 0; overflow: hidden; font-family: Arial, Helvetica, sans-serif; }
        #info {
            position: absolute;
            top: 20px;
            left: 20px;
            color: white;
            background: rgba(0,0,0,0.6);
            padding: 10px 20px;
            border-radius: 30px;
            pointer-events: none;
            z-index: 10;
        }
    </style>
</head>
<body>
    <div id="info">🖱️ Вращайте модель мышью • Колесо — зум</div>

    <!-- Используем мощный бесплатный 3D-просмотрщик 3dviewer.net -->
    <iframe 
        width="100%" 
        height="100%" 
        style="position: absolute; top: 0; left: 0; border: none;"
        src="https://3dviewer.net/embed.html#model=https://raw.githubusercontent.com/roman4eg15426378-oss/ksb1342/b9804088a81bc1067f0e8a734f4b9aecb88b6c61/rrrrr.stl$camera=200,400,500,255,255,255,0,1,0,45$projectionmode=Perspective$envsettings=fishermans_bastion,off$backgroundcolor=42,43,46,255">
    </iframe>
</body>
</html>
