<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>3D Model Viewer</title>
  <!-- Подключаем библиотеку model-viewer -->
  <script type="module" src="https://ajax.googleapis.com/ajax/libs/model-viewer/3.5.0/model-viewer.min.js"></script>
  <style>
    body, html { margin: 0; padding: 0; height: 100%; }
    model-viewer { width: 100%; height: 100%; }
  </style>
</head>
<body>
  <!-- В src укажите прямой путь к вашему файлу модели -->
  <model-viewer 
    src="https://github.com/roman4eg15426378-oss/ksb1342/blob/8109cb12718fbdc7cc2062b6f124b3f764d3af0d/123231.wrl"
    alt="3D модель"
    camera-controls
    auto-rotate
    ar
    shadow-intensity="1"
    environment-image="neutral">
  </model-viewer>
</body>
</html>
